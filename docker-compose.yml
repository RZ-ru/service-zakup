services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

  user-service:
    build: ./services/user-service
    ports:
      - "8081:8080"
    environment:
      DB_URL: postgres://postgres:postgres@postgres:5432/user_db?sslmode=disable
    depends_on:
      - postgres

  task-service:
    build: ./services/task-service
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://postgres:postgres@postgres:5432/task_db?sslmode=disable
    depends_on:
      - postgres

volumes:
  postgres_data: